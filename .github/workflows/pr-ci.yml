name: PR CI

on:
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache NX build cache
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            nx-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            nx-${{ runner.os }}-

      - name: Check formatting
        run: npx prettier --check "src/**/*.ts" "apps/**/*.ts"

      - name: TypeScript type check (all apps)
        run: |
          npx tsc --noEmit -p tsconfig.app.json
          npx tsc --noEmit -p apps/portal/tsconfig.app.json
          npx tsc --noEmit -p apps/reporting/tsconfig.app.json
          npx tsc --noEmit -p apps/workforce/tsconfig.app.json
          npx tsc --noEmit -p apps/approvals/tsconfig.app.json
          npx tsc --noEmit -p apps/analytics/tsconfig.app.json

      - name: Dependency security audit
        run: npm audit --audit-level=high
        continue-on-error: true

      # ── Builds ──────────────────────────────────────────────────────────────

      - name: Build all apps (production)
        run: |
          npm run build -- --configuration production
          npm run build:portal -- --configuration production
          npm run build:reporting -- --configuration production
          npm run build:workforce -- --configuration production
          npm run build:approvals -- --configuration production
          npm run build:analytics -- --configuration production

      - name: Upload production builds
        uses: actions/upload-artifact@v4
        with:
          name: production-builds
          path: dist/
          retention-days: 3

      # ── Unit Tests ───────────────────────────────────────────────────────────

      - name: Run all unit tests with coverage
        run: |
          npm run test:coverage
          npm run test:portal
          npm run test:reporting
          npm run test:workforce
          npm run test:approvals
          npm run test:analytics
          npm run test:integration

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      # ── E2E Tests ────────────────────────────────────────────────────────────

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run all E2E tests
        run: |
          npm run test:e2e
          npm run test:e2e:workforce
          npm run test:e2e:approvals
          npm run test:e2e:analytics

      - name: Upload Playwright reports
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      # ── Docker ───────────────────────────────────────────────────────────────

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (appbench)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: hello-angular-azdo:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
