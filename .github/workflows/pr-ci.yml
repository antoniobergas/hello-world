name: PR CI

on:
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required for SonarQube blame data

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npx prettier --check "src/**/*.ts" "apps/**/*.ts"

      - name: TypeScript type check (appbench)
        run: npx tsc --noEmit -p tsconfig.app.json

      - name: TypeScript type check (portal)
        run: npx tsc --noEmit -p apps/portal/tsconfig.app.json

      - name: TypeScript type check (reporting)
        run: npx tsc --noEmit -p apps/reporting/tsconfig.app.json

      - name: TypeScript type check (workforce)
        run: npx tsc --noEmit -p apps/workforce/tsconfig.app.json

      - name: TypeScript type check (approvals)
        run: npx tsc --noEmit -p apps/approvals/tsconfig.app.json

      - name: TypeScript type check (analytics)
        run: npx tsc --noEmit -p apps/analytics/tsconfig.app.json

      - name: Dependency security audit
        run: npm audit --audit-level=high
        continue-on-error: true

      # ── Builds ──────────────────────────────────────────────────────────────

      - name: Build appbench (production)
        run: npm run build -- --configuration production

      - name: Build portal (production)
        run: npm run build:portal -- --configuration production

      - name: Build reporting (production)
        run: npm run build:reporting -- --configuration production

      - name: Build workforce (production)
        run: npm run build:workforce -- --configuration production

      - name: Build approvals (production)
        run: npm run build:approvals -- --configuration production

      - name: Build analytics (production)
        run: npm run build:analytics -- --configuration production

      - name: Upload production builds
        uses: actions/upload-artifact@v4
        with:
          name: production-builds
          path: dist/
          retention-days: 3

      # ── Unit Tests ───────────────────────────────────────────────────────────

      - name: Run appbench unit tests with coverage
        run: npm run test:coverage

      - name: Run portal unit tests
        run: npm run test:portal

      - name: Run reporting unit tests
        run: npm run test:reporting

      - name: Run workforce unit tests
        run: npm run test:workforce

      - name: Run approvals unit tests
        run: npm run test:approvals

      - name: Run analytics unit tests
        run: npm run test:analytics

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Run integration tests
        run: npm run test:integration

      # ── E2E Tests ────────────────────────────────────────────────────────────

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run appbench E2E tests
        run: npm run test:e2e

      - name: Upload appbench Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-appbench
          path: playwright-report/
          retention-days: 7

      - name: Run workforce E2E tests
        run: npm run test:e2e:workforce

      - name: Upload workforce Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-workforce
          path: playwright-report/
          retention-days: 7

      - name: Run approvals E2E tests
        run: npm run test:e2e:approvals

      - name: Upload approvals Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-approvals
          path: playwright-report/
          retention-days: 7

      - name: Run analytics E2E tests
        run: npm run test:e2e:analytics

      - name: Upload analytics Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-analytics
          path: playwright-report/
          retention-days: 7

      # ── Static Analysis ──────────────────────────────────────────────────────

      - name: SonarQube analysis
        uses: SonarSource/sonarcloud-github-action@v3
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # ── Docker ───────────────────────────────────────────────────────────────

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (appbench)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: hello-angular-azdo:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
